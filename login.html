<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>登录 · 新笔文学社</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:sans-serif;background:#faf7f0;color:#2c2416;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;padding:32px 24px;border-radius:16px;box-shadow:0 8px 36px rgba(0,0,0,.06);width:100%;max-width:400px;border:1px solid #e0d8c8}
.card h1{text-align:center;font-size:1.3rem;color:#8b3a3a;margin-bottom:6px;letter-spacing:3px}
.card .sub{text-align:center;font-size:.8rem;color:#888;margin-bottom:22px}
.tabs{display:flex;border-bottom:2px solid #eee;margin-bottom:18px}
.tabs button{flex:1;padding:10px;border:none;background:none;font-weight:700;font-size:.95rem;cursor:pointer;color:#888;font-family:inherit}
.tabs button.on{color:#8b3a3a;border-bottom:2px solid #8b3a3a;margin-bottom:-2px}
.fg{margin-bottom:14px}.fg label{display:block;font-weight:700;font-size:.8rem;margin-bottom:4px}
.fg input{width:100%;padding:11px 14px;border:1.5px solid #ddd;border-radius:8px;font-size:.9rem;font-family:inherit}
.fg input:focus{outline:none;border-color:#b8964a}
.btn{width:100%;padding:12px;background:#8b3a3a;color:#fff;border:none;border-radius:8px;font-weight:700;font-size:1rem;cursor:pointer}.btn:hover{background:#6b2a2a}.btn:disabled{opacity:.5}
.err{color:#8b3a3a;font-size:.8rem;text-align:center;margin-top:8px;display:none}
.sw{text-align:center;margin-top:14px;font-size:.82rem;color:#888}.sw a{color:#8b3a3a;font-weight:700;cursor:pointer}
.links{text-align:center;margin-top:16px;font-size:.78rem}.links a{color:#888;text-decoration:none;margin:0 6px}
.fp{text-align:right;margin-bottom:10px;font-size:.78rem;color:#888;cursor:pointer}
.toast{position:fixed;top:16px;right:16px;z-index:999;padding:10px 18px;border-radius:8px;color:#fff;font-weight:700;font-size:.85rem;opacity:0;transition:.3s;pointer-events:none}.toast.show{opacity:1}.toast-ok{background:#5b7a6a}.toast-err{background:#8b3a3a}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="card">
<h1>新笔文学社</h1><p class="sub">以文会友 · 以笔写心</p>
<div class="tabs"><button class="on" id="t0" onclick="sw(0)">登 录</button><button id="t1" onclick="sw(1)">注 册</button></div>
<form onsubmit="return hs()">
<div class="fg" id="gU" style="display:none"><label>用户名</label><input id="aU" placeholder="给自己起个笔名" maxlength="20"></div>
<div class="fg"><label>邮箱</label><input type="email" id="aE" placeholder="请输入邮箱" required></div>
<div class="fg"><label>密码</label><input type="password" id="aP" placeholder="至少6位" required minlength="6"></div>
<p class="fp" id="fpL" onclick="fp()">忘记密码？</p>
<button type="submit" class="btn" id="sBtn">登 录</button>
<p class="err" id="fE"></p>
</form>
<p class="sw" id="sT">没有账号？<a onclick="sw(1)">立即注册</a></p>
</div>
<p class="links"><a href="index.html">← 返回首页</a> · <a href="admin.html">管理后台</a></p>

<script>
var U='https://aybnmewinjckmftvctvx.supabase.co';
var K='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF5Ym5tZXdpbmpja21mdHZjdHZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3NDE3NTIsImV4cCI6MjA5ODMxNzc1Mn0.BtEGJgZZbMCVvkRkmgeSw8mrTcf6xIiLZrL9Xm7mdnE';
var mode=0;
function Q(s){return document.querySelector(s)}
function toast(m,t){var e=Q('#toast');e.textContent=m;e.className='toast toast-'+(t||'ok')+' show';setTimeout(function(){e.classList.remove('show')},2500)}

function sw(v){mode=v;Q('#t0').classList.toggle('on',v===0);Q('#t1').classList.toggle('on',v===1);Q('#gU').style.display=v===1?'':'none';Q('#sBtn').textContent=v===0?'登 录':'注 册';Q('#fpL').style.display=v===0?'':'none';Q('#sT').innerHTML=v===0?'没有账号？<a onclick="sw(1)">立即注册</a>':'已有账号？<a onclick="sw(0)">去登录</a>';Q('#fE').style.display='none'}

function fp(){var em=Q('#aE').value.trim();if(!em){toast('请先输入邮箱','err');return}fetch(U+'/auth/v1/recover',{method:'POST',headers:{'apikey':K,'Content-Type':'application/json'},body:JSON.stringify({email:em})}).then(function(r){if(r.ok)toast('重置邮件已发送');else toast('发送失败','err')})}

function hs(){
var em=Q('#aE').value.trim(),pw=Q('#aP').value,un=Q('#aU').value.trim();
Q('#fE').style.display='none';
if(!em||!pw){Q('#fE').textContent='请填写邮箱和密码';Q('#fE').style.display='block';return false}
if(pw.length<6){Q('#fE').textContent='密码至少6位';Q('#fE').style.display='block';return false}
if(mode===1&&!un){Q('#fE').textContent='请输入用户名';Q('#fE').style.display='block';return false}
var btn=Q('#sBtn');btn.disabled=true;btn.textContent='处理中...';
var url=mode===0?(U+'/auth/v1/token?grant_type=password'):(U+'/auth/v1/signup');
fetch(url,{method:'POST',headers:{'apikey':K,'Content-Type':'application/json'},body:JSON.stringify({email:em,password:pw})}).then(function(r){
return r.json().then(function(d){if(!r.ok)throw new Error(d.msg||d.error_description||'请求失败');return d});
}).then(function(d){
if(mode===1){toast('注册成功！请登录');sw(0)}
else{sessionStorage.setItem('sb_token',d.access_token);sessionStorage.setItem('sb_refresh_token',d.refresh_token);fetch(U+'/auth/v1/user',{headers:{'apikey':K,'Authorization':'Bearer '+d.access_token}}).then(function(r){return r.json()}).then(function(u){sessionStorage.setItem('sb_user',JSON.stringify(u))});toast('登录成功！');setTimeout(function(){location.href='index.html'},800)}
}).catch(function(err){Q('#fE').textContent=err.message;Q('#fE').style.display='block'}).finally(function(){btn.disabled=false;btn.textContent=mode===0?'登 录':'注 册'});
return false;
}
</script>
</body>
</html>
