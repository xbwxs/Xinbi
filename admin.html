<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>管理后台 · 新笔文学社</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #f5f1e8;
            --card: #fff;
            --text: #2c2416;
            --muted: #888;
            --primary: #8b3a3a;
            --primary-h: #6b2a2a;
            --gold: #d4a040;
            --sidebar-bg: #1a1410;
            --border: #e5ded4;
            --shadow: 0 2px 12px rgba(0, 0, 0, .06);
            --radius: 12px;
            --radius-sm: 8px
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }
        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5
        }
        .lp {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            background: linear-gradient(135deg, #f5f1e8 0%, #e8dfd1 50%, #f0e6d8 100%)
        }
        .lc {
            background: #fff;
            padding: 44px 32px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid #e5ded4;
            box-shadow: 0 8px 40px rgba(0, 0, 0, .08)
        }
        .lc .logo-icon {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 8px
        }
        .lc h1 {
            font-size: 1.5rem;
            color: var(--primary);
            margin-bottom: 4px;
            letter-spacing: 1px
        }
        .lc p.sub {
            font-size: .85rem;
            color: var(--muted);
            margin-bottom: 28px
        }
        .lc .fg {
            text-align: left;
            margin-bottom: 16px
        }
        .lc .fg label {
            display: block;
            font-weight: 600;
            font-size: .78rem;
            margin-bottom: 5px;
            color: #555
        }
        .lc input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e5ded4;
            border-radius: var(--radius-sm);
            font-size: 1rem;
            background: #fafaf8;
            font-family: inherit
        }
        .lc input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(139, 58, 58, .08);
            background: #fff
        }
        .lc button {
            width: 100%;
            padding: 13px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            letter-spacing: 1px;
            margin-top: 4px;
            transition: .2s
        }
        .lc button:hover {
            background: var(--primary-h);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(139, 58, 58, .3)
        }
        .lc button:disabled {
            opacity: .5;
            cursor: not-allowed;
            transform: none
        }
        .lc .err {
            color: #c0392b;
            font-size: .85rem;
            margin-top: 10px;
            display: none;
            background: #fef2f2;
            padding: 8px 12px;
            border-radius: 6px
        }
        .app {
            display: none
        }
        .app.show {
            display: flex
        }
        .sb {
            width: 220px;
            background: var(--sidebar-bg);
            color: #ccc;
            min-height: 100vh;
            padding: 20px 0;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            overflow-y: auto;
            z-index: 10;
            display: flex;
            flex-direction: column
        }
        .sb .sb-brand {
            text-align: center;
            padding: 0 16px 18px;
            border-bottom: 1px solid rgba(255, 255, 255, .08);
            margin-bottom: 8px
        }
        .sb .sb-brand h2 {
            font-size: .95rem;
            color: #e8d5b0;
            letter-spacing: 1px
        }
        .sb .sb-nav {
            flex: 1
        }
        .sb a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 18px;
            color: #888;
            text-decoration: none;
            font-size: .85rem;
            border-left: 3px solid transparent;
            transition: .2s;
            margin: 2px 0
        }
        .sb a i {
            width: 18px;
            text-align: center;
            font-size: .9rem
        }
        .sb a:hover,
        .sb a.on {
            color: var(--gold);
            background: rgba(255, 255, 255, .025);
            border-left-color: var(--gold)
        }
        .sb a.o2 {
            color: #b55a5a;
            margin-top: auto
        }
        .sb a.o2:hover {
            color: #e07070;
            border-left-color: #b55a5a
        }
        .sb .sb-badge {
            display: inline-block;
            background: #c0392b;
            color: #fff;
            font-size: .65rem;
            padding: 2px 7px;
            border-radius: 10px;
            margin-left: auto;
            font-weight: 700;
            min-width: 20px;
            text-align: center
        }
        .mn {
            margin-left: 220px;
            flex: 1;
            padding: 28px 32px;
            min-height: 100vh;
            max-width: calc(100vw - 220px)
        }
        .mn h2 {
            font-size: 1.4rem;
            color: var(--primary);
            margin-bottom: 22px;
            display: flex;
            align-items: center;
            gap: 10px
        }
        .mn h2 i {
            font-size: 1.2rem;
            opacity: .7
        }
        .st {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 14px;
            margin-bottom: 28px
        }
        .st>div {
            background: var(--card);
            padding: 18px 16px;
            border-radius: var(--radius);
            text-align: center;
            cursor: pointer;
            transition: .2s;
            border: 1px solid transparent;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden
        }
        .st>div:hover {
            border-color: #d4c8b0;
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(0, 0, 0, .1)
        }
        .st>div.accent::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--primary)
        }
        .st>div.accent-gold::before {
            background: var(--gold)
        }
        .st .n {
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--primary)
        }
        .st .l {
            font-size: .78rem;
            color: var(--muted);
            margin-top: 4px
        }
        .tr {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
            background: var(--card);
            padding: 14px 18px;
            border-radius: var(--radius);
            box-shadow: var(--shadow)
        }
        .tr .tr-left {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap
        }
        .tr .tr-right {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap
        }
        .tr select,
        .tr input {
            padding: 9px 14px;
            border: 2px solid #e5ded4;
            border-radius: var(--radius-sm);
            font-size: .85rem;
            background: #fff;
            font-family: inherit
        }
        .tr select:focus,
        .tr input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(139, 58, 58, .06)
        }
        .tr input {
            min-width: 200px
        }
        .tb {
            background: var(--card);
            border-radius: var(--radius);
            overflow-x: auto;
            box-shadow: var(--shadow)
        }
        .tb table {
            width: 100%;
            border-collapse: collapse;
            font-size: .82rem
        }
        .tb th {
            background: #faf7f2;
            padding: 12px 14px;
            text-align: left;
            font-weight: 700;
            font-size: .75rem;
            color: #888;
            border-bottom: 2px solid #e5ded4;
            white-space: nowrap;
            letter-spacing: .3px
        }
        .tb td {
            padding: 10px 14px;
            border-bottom: 1px solid #f3efe8;
            vertical-align: middle
        }
        .tb tbody tr:hover {
            background: #fdfcfa
        }
        .bd {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 14px;
            font-size: .72rem;
            font-weight: 700;
            letter-spacing: .3px
        }
        .bd0 {
            background: #fef3c7;
            color: #92400e
        }
        .bd1 {
            background: #d1fae5;
            color: #065f46
        }
        .bd2 {
            background: #fee2e2;
            color: #991b1b
        }
        .bb {
            padding: 6px 13px;
            border-radius: 14px;
            border: none;
            cursor: pointer;
            font-size: .72rem;
            font-weight: 700;
            margin: 2px;
            transition: .2s;
            letter-spacing: .3px;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 4px
        }
        .bb:hover {
            opacity: .75;
            transform: translateY(-1px)
        }
        .b1 {
            background: #dbeafe;
            color: #1e40af
        }
        .b2 {
            background: #d1fae5;
            color: #065f46
        }
        .b3 {
            background: #fee2e2;
            color: #991b1b
        }
        .b4 {
            background: #f3f4f6;
            color: #6b7280
        }
        .b5 {
            background: #e0e7ff;
            color: #3730a3
        }
        .b-danger {
            background: #fee2e2;
            color: #991b1b
        }
        .bt {
            padding: 10px 22px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 700;
            font-size: .85rem;
            margin: 3px;
            cursor: pointer;
            transition: .2s;
            letter-spacing: .5px;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 6px
        }
        .bt:hover {
            background: var(--primary-h);
            transform: translateY(-1px);
            box-shadow: 0 3px 12px rgba(139, 58, 58, .25)
        }
        .bg {
            background: #5b7a6a
        }
        .bg:hover {
            background: #4a6658
        }
        .by {
            background: #b8964a
        }
        .by:hover {
            background: #9a7d3d
        }
        .bk {
            background: #6b5f52
        }
        .bk:hover {
            background: #5a4f44
        }
        .bt-sm {
            padding: 6px 14px;
            font-size: .75rem
        }
        .mo {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(0, 0, 0, .55);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(2px)
        }
        .mo.show {
            display: flex
        }
        .mb {
            background: #fff;
            padding: 28px 24px;
            border-radius: 16px;
            max-width: 680px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 16px 48px rgba(0, 0, 0, .2)
        }
        .mb h3 {
            color: var(--primary);
            margin-bottom: 16px;
            font-size: 1.15rem
        }
        .x {
            position: absolute;
            top: 12px;
            right: 16px;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #999;
            line-height: 1;
            padding: 4px 8px;
            border-radius: 6px
        }
        .x:hover {
            color: var(--primary);
            background: #f5f1e8
        }
        .fg {
            margin-bottom: 14px
        }
        .fg label {
            display: block;
            font-weight: 700;
            font-size: .78rem;
            margin-bottom: 4px;
            color: #555
        }
        .fg input,
        .fg textarea,
        .fg select {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #e5ded4;
            border-radius: var(--radius-sm);
            font-size: .85rem;
            font-family: inherit;
            background: #fafaf8
        }
        .fg input:focus,
        .fg textarea:focus,
        .fg select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(139, 58, 58, .06);
            background: #fff
        }
        .fg textarea {
            min-height: 100px;
            resize: vertical
        }
        .fr {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px
        }
        .tm {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            padding: 12px 22px;
            border-radius: 10px;
            color: #fff;
            font-weight: 700;
            font-size: .85rem;
            opacity: 0;
            transition: .35s;
            pointer-events: none;
            box-shadow: 0 6px 24px rgba(0, 0, 0, .2);
            letter-spacing: .5px
        }
        .tm.show {
            opacity: 1;
            pointer-events: auto
        }
        .ok {
            background: #5b7a6a
        }
        .er {
            background: #c0392b
        }
        .pg {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            margin-top: 18px;
            flex-wrap: wrap
        }
        .pg button {
            padding: 7px 14px;
            border: 2px solid #e5ded4;
            background: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: .78rem;
            color: #555
        }
        .pg button:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: #fdf7f7
        }
        .pg button.on {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary)
        }
        .pg button:disabled {
            opacity: .4;
            cursor: not-allowed
        }
        .empty {
            text-align: center;
            padding: 40px !important;
            color: #bbb
        }
        .empty i {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 10px;
            opacity: .5
        }
        @media(max-width:768px) {
            .sb {
                width: 54px
            }
            .sb .sb-brand h2 {
                font-size: 0;
                padding: 6px
            }
            .sb .sb-brand h2::after {
                content: '✒';
                font-size: 1.2rem
            }
            .sb a span {
                display: none
            }
            .sb a {
                justify-content: center;
                padding: 12px 0
            }
            .sb .sb-badge {
                display: none
            }
            .mn {
                margin-left: 54px;
                padding: 16px;
                max-width: calc(100vw - 54px)
            }
            .st {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px
            }
            .st .n {
                font-size: 1.6rem
            }
            .fr {
                grid-template-columns: 1fr
            }
            .tr {
                flex-direction: column;
                align-items: stretch
            }
            .tr .tr-left,
            .tr .tr-right {
                justify-content: center
            }
            .tr input {
                min-width: auto;
                width: 100%
            }
        }
    </style>
</head>
<body>
    <div class="tm" id="toast"></div>

    <div class="lp" id="lp">
        <div class="lc">
            <div class="logo-icon"><i class="fas fa-feather-alt"></i></div>
            <h1>新笔文学社</h1>
            <p class="sub">管理后台 · 内容与社员管理中心</p>
            <div class="fg"><label>管理员邮箱</label><input type="email" id="le" placeholder="admin@xinbi.com"></div>
            <div class="fg"><label>密码</label><input type="password" id="lpw" placeholder="••••••••"></div>
            <button id="lbtn" onclick="doLogin()">登 录</button>
            <p class="err" id="lerr"></p>
        </div>
    </div>

    <div class="app" id="app">
        <div class="sb">
            <div class="sb-brand"><h2>新笔文学社</h2></div>
            <div class="sb-nav">
                <a href="#" class="on" data-p="d"><i class="fas fa-tachometer-alt"></i><span>仪表盘</span></a>
                <a href="#" data-p="s"><i class="fas fa-file-alt"></i><span>投稿管理</span><span class="sb-badge" id="badge-s" style="display:none">0</span></a>
                <a href="#" data-p="a"><i class="fas fa-user-plus"></i><span>社员申请</span><span class="sb-badge" id="badge-a" style="display:none">0</span></a>
                <a href="#" data-p="w"><i class="fas fa-book-open"></i><span>作品管理</span></a>
                <a href="#" data-p="c"><i class="fas fa-comments"></i><span>评论管理</span></a>
                <a href="#" data-p="u"><i class="fas fa-users"></i><span>用户管理</span></a>
            </div>
            <a href="#" onclick="doLogout()" class="o2"><i class="fas fa-sign-out-alt"></i><span>退出登录</span></a>
        </div>
        <div class="mn" id="mc"></div>
    </div>
    <div class="mo" id="mo"><div class="mb" id="mob"></div></div>

    <script>
        var SUPABASE_URL = 'https://aybnmewinjckmftvctvx.supabase.co';
        var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF5Ym5tZXdpbmpja21mdHZjdHZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3NDE3NTIsImV4cCI6MjA5ODMxNzc1Mn0.BtEGJgZZbMCVvkRkmgeSw8mrTcf6xIiLZrL9Xm7mdnE';
        var currentPanel = 'd';
        var PER_PAGE = 20;
        var pageState = {}, filterState = {}, searchState = {};

        function qs(s) { return document.querySelector(s); }
        function qsa(s) { return document.querySelectorAll(s); }

        function showToast(msg, type) {
            var e = qs('#toast'); e.textContent = msg;
            e.className = 'tm ' + (type || 'ok') + ' show';
            clearTimeout(e._tid);
            e._tid = setTimeout(function() { e.classList.remove('show'); }, 2200);
        }

        function escHtml(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
        function fmtDate(d) { return d ? new Date(d).toLocaleDateString('zh-CN') : '-'; }
        function fmtDateTime(d) { return d ? new Date(d).toLocaleString('zh-CN') : '-'; }
        function statusLabel(s) { var m = { pending: '待审核', approved: '已通过', rejected: '已拒绝' }; return m[s] || '待审核'; }
        function getToken() { return sessionStorage.getItem('tk'); }

        function api(path, opts) {
            opts = opts || {};
            var headers = { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' };
            var token = getToken();
            if (token) headers['Authorization'] = 'Bearer ' + token;
            var url = SUPABASE_URL + '/rest/v1/' + path;
            var fetchOpts = { method: opts.method || 'GET', headers: headers };
            if (opts.body && fetchOpts.method !== 'GET' && fetchOpts.method !== 'HEAD')
                fetchOpts.body = JSON.stringify(opts.body);
            var ctrl = new AbortController(); fetchOpts.signal = ctrl.signal;
            var t = setTimeout(function() { ctrl.abort(); }, 15000);
            return fetch(url, fetchOpts).then(function(r) {
                clearTimeout(t);
                if (r.status === 204) return { ok: true };
                return r.json().then(function(d) {
                    if (!r.ok) throw new Error(d.message || d.error_description || '请求失败(' + r.status + ')');
                    return d;
                });
            }).catch(function(e) { clearTimeout(t); if (e.name === 'AbortError') throw new Error('请求超时'); throw e; });
        }

        function apiCount(path) {
            var headers = { 'apikey': SUPABASE_KEY, 'Prefer': 'count=exact' };
            var token = getToken(); if (token) headers['Authorization'] = 'Bearer ' + token;
            var sep = path.indexOf('?') === -1 ? '?' : '&';
            return fetch(SUPABASE_URL + '/rest/v1/' + path + sep + 'limit=0', { method: 'GET', headers: headers })
                .then(function(r) {
                    var cr = r.headers.get('content-range');
                    if (cr) { var p = cr.split('/'); if (p.length === 2) return parseInt(p[1]) || 0; }
                    return 0;
                }).catch(function() { return 0; });
        }

        function doLogin() {
            var email = qs('#le').value.trim(), pw = qs('#lpw').value, btn = qs('#lbtn'), err = qs('#lerr');
            err.style.display = 'none';
            if (!email || !pw) { err.textContent = '请填写邮箱和密码'; err.style.display = 'block'; return; }
            btn.disabled = true; btn.textContent = '验证中...';
            var ctrl = new AbortController(), t = setTimeout(function() { ctrl.abort(); }, 15000);
            fetch(SUPABASE_URL + '/auth/v1/token?grant_type=password', {
                method: 'POST', headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, password: pw }), signal: ctrl.signal
            }).then(function(r) {
                clearTimeout(t);
                return r.json().then(function(d) { if (!r.ok) throw new Error(d.error_description || '邮箱或密码错误'); return d; });
            }).then(function(data) {
                return api('profiles?id=eq.' + data.user.id + '&select=role').then(function(pr) {
                    if (!pr || !pr.length || pr[0].role !== 'admin') throw new Error('无管理权限');
                    sessionStorage.setItem('tk', data.access_token);
                    sessionStorage.setItem('ok', '1');
                    qs('#lp').style.display = 'none'; qs('#app').classList.add('show');
                    switchPanel('d'); refreshBadges();
                });
            }).catch(function(e) {
                clearTimeout(t); err.textContent = e.message; err.style.display = 'block';
            }).finally(function() { clearTimeout(t); btn.disabled = false; btn.textContent = '登 录'; });
        }

        function doLogout() { sessionStorage.clear(); location.reload(); }

        function switchPanel(p) {
            currentPanel = p;
            qs('#mc').innerHTML = '<p style="text-align:center;padding:60px;color:#bbb;"><i class="fas fa-spinner fa-spin" style="display:block;font-size:2rem;margin-bottom:12px;"></i>加载中...</p>';

        function viewDetail(table, id) {
            openModal('<button class="x" onclick="closeModal()">&times;</button><h3>📋 详情</h3><p style="text-align:center;padding:20px;color:#bbb;"><i class="fas fa-spinner fa-spin"></i> 加载中...</p>');
            api(table + '?id=eq.' + id + '&select=*').then(function(data) {
                if (!data || !data.length) { showToast('数据不存在', 'er'); closeModal(); return; }
                var x = data[0], h = '<button class="x" onclick="closeModal()">&times;</button><h3>📋 详情</h3>', keys = Object.keys(x);
                var lm = { title: '标题', name: '姓名', email: '邮箱', grade: '年级', type: '类型', status: '状态', content: '内容', author: '作者', category: '分类', likes: '点赞数', excerpt: '摘要', image_url: '封面URL', class_name: '班级', interest: '兴趣', role: '角色', display_name: '显示名称', created_at: '创建时间', published: '发布状态', user_id: '用户ID', work_id: '作品ID' };
                for (var ki = 0; ki < keys.length; ki++) {
                    var k = keys[ki]; if (k === 'id' || k === 'updated_at') continue;
                    var v = x[k]; if (v === null || v === undefined) v = ''; else v = String(v);
                    var label = lm[k] || k;
                    if (k === 'content' || (v.length > 300 && k !== 'image_url')) h += '<div class="fg"><label>' + escHtml(label) + '</label><div style="background:#f9f6f0;padding:12px;border-radius:8px;white-space:pre-wrap;font-size:.85rem;max-height:200px;overflow-y:auto;">' + escHtml(v) + '</div></div>';
                    else h += '<p style="margin:4px 0;"><strong>' + escHtml(label) + '：</strong> ' + escHtml(v) + '</p>';
                }
                qs('#mob').innerHTML = h;
            }).catch(function(e) { qs('#mob').innerHTML = '<button class="x" onclick="closeModal()">&times;</button><h3>❌ 加载失败</h3><p style="color:#c0392b;">' + escHtml(e.message) + '</p><button class="bt bt-sm" onclick="closeModal()">关闭</button>'; });
        }

        function viewUser(uid) {
            openModal('<button class="x" onclick="closeModal()">&times;</button><h3>📋 用户详情</h3><p style="text-align:center;padding:20px;color:#bbb;"><i class="fas fa-spinner fa-spin"></i> 加载中...</p>');
            api('profiles?id=eq.' + uid + '&select=*').then(function(data) {
                if (!data || !data.length) { showToast('未找到该用户', 'er'); closeModal(); return; }
                var x = data[0], h = '<button class="x" onclick="closeModal()">&times;</button><h3>📋 用户详情</h3>';
                h += '<div style="background:#f9f6f0;padding:14px;border-radius:8px;margin-bottom:12px;">';
                h += '<p><strong>ID：</strong>' + escHtml(x.id) + '</p><p><strong>显示名称：</strong>' + escHtml(x.display_name || '未设置') + '</p><p><strong>邮箱：</strong>' + escHtml(x.email || '未绑定') + '</p><p><strong>角色：</strong>' + (x.role === 'admin' ? '🔑 管理员' : '👤 普通用户') + '</p><p><strong>注册时间：</strong>' + fmtDateTime(x.created_at) + '</p></div>';
                h += '<button class="bt b5 bt-sm" onclick="editUserRole(\'' + uid + '\')">✏️ 编辑角色</button> ';
                if (x.role !== 'admin') h += '<button class="bt b-danger bt-sm" onclick="if(confirm(\'确定删除该用户？\')){deleteUser(\'' + uid + '\');closeModal();}">🗑 删除</button>';
                qs('#mob').innerHTML = h;
            }).catch(function(e) { qs('#mob').innerHTML = '<button class="x" onclick="closeModal()">&times;</button><h3>❌</h3><p style="color:#c0392b;">' + escHtml(e.message) + '</p><button class="bt bt-sm" onclick="closeModal()">关闭</button>'; showToast('查看失败: ' + e.message, 'er'); });
        }

        function editUserRole(uid) {
            openModal('<button class="x" onclick="closeModal()">&times;</button><h3>✏️ 编辑角色</h3><p style="text-align:center;padding:20px;color:#bbb;"><i class="fas fa-spinner fa-spin"></i> 加载中...</p>');
            api('profiles?id=eq.' + uid + '&select=*').then(function(data) {
                if (!data || !data.length) { showToast('未找到该用户', 'er'); closeModal(); return; }
                var x = data[0], h = '<button class="x" onclick="closeModal()">&times;</button><h3>✏️ 编辑用户角色</h3>';
                h += '<div style="background:#f9f6f0;padding:12px;border-radius:8px;margin-bottom:14px;"><p><strong>用户名：</strong>' + escHtml(x.display_name || x.email || '未知') + '</p><p><strong>邮箱：</strong>' + escHtml(x.email || '-') + '</p><p><strong>当前角色：</strong>' + (x.role === 'admin' ? '管理员' : '普通用户') + '</p></div>';
                h += '<div class="fg"><label>新角色</label><select id="eu_role"><option value="user"' + (x.role === 'user' ? ' selected' : '') + '>👤 普通用户</option><option value="admin"' + (x.role === 'admin' ? ' selected' : '') + '>🔑 管理员</option></select></div>';
                h += '<button class="bt" style="width:100%;margin-top:8px;" onclick="saveUserRole(\'' + uid + '\')">💾 保存角色</button>';
                qs('#mob').innerHTML = h;
            }).catch(function(e) { qs('#mob').innerHTML = '<button class="x" onclick="closeModal()">&times;</button><h3>❌</h3><p style="color:#c0392b;">' + escHtml(e.message) + '</p><button class="bt bt-sm" onclick="closeModal()">关闭</button>'; });
        }

        function saveUserRole(uid) {
            var role = qs('#eu_role').value;
            api('profiles?id=eq.' + uid, { method: 'PATCH', body: { role: role } }).then(function() { closeModal(); showToast('✅ 角色已更新'); switchPanel('u'); }).catch(function(e) { showToast('保存失败: ' + e.message, 'er'); });
        }

        function deleteUser(uid) {
            if (!confirm('⚠️ 确定要永久删除该用户吗？此操作不可恢复！')) return;
            fetch(SUPABASE_URL + '/rest/v1/rpc/delete_user', {
                method: 'POST',
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + getToken(), 'Content-Type': 'application/json' },
                body: JSON.stringify({ target_id: uid })
            }).then(function(r) { if (!r.ok) return r.json().then(function(d) { throw new Error(d.message || '删除失败'); }); showToast('🗑️ 用户已删除'); switchPanel('u'); }).catch(function(e) { showToast('删除失败: ' + e.message, 'er'); });
        }

        function updateStatus(table, id, status) {
            api(table + '?id=eq.' + id, { method: 'PATCH', body: { status: status } }).then(function() { showToast(status === 'approved' ? '✅ 已通过' : '❌ 已拒绝'); refreshBadges(); switchPanel(currentPanel); }).catch(function(e) { showToast('操作失败: ' + e.message, 'er'); });
        }

        function deleteRecord(table, id) {
            if (!confirm('⚠️ 确定要永久删除这条记录吗？此操作不可恢复！')) return;
            api(table + '?id=eq.' + id, { method: 'DELETE' }).then(function() { showToast('🗑️ 已删除'); refreshBadges(); switchPanel(currentPanel); }).catch(function(e) { showToast('删除失败: ' + e.message, 'er'); });
        }

        function editWork(id) {
            openModal('<button class="x" onclick="closeModal()">&times;</button><h3>✏️ 编辑作品</h3><p style="text-align:center;padding:20px;color:#bbb;"><i class="fas fa-spinner fa-spin"></i> 加载中...</p>');
            api('works?id=eq.' + id + '&select=*').then(function(data) {
                if (!data || !data.length) { showToast('作品不存在', 'er'); closeModal(); return; }
                var w = data[0], h = '<button class="x" onclick="closeModal()">&times;</button><h3>✏️ 编辑作品</h3>';
                h += '<form onsubmit="return saveWork(event,' + id + ')"><div class="fg"><label>标题 *</label><input id="ew_t" value="' + escHtml(w.title) + '" required></div><div class="fr"><div class="fg"><label>作者 *</label><input id="ew_a" value="' + escHtml(w.author) + '" required></div><div class="fg"><label>年级</label><input id="ew_g" value="' + escHtml(w.grade || '') + '"></div></div><div class="fr"><div class="fg"><label>班级</label><input id="ew_c" value="' + escHtml(w.class_name || '') + '"></div><div class="fg"><label>类型</label><select id="ew_ct">';
                ['prose','poetry','fiction','essay'].forEach(function(c){ var n={prose:'散文',poetry:'诗歌',fiction:'小说',essay:'随笔'}; h+='<option value="'+c+'"'+(w.category===c?' selected':'')+'>'+n[c]+'</option>'; });
                h += '</select></div></div><div class="fg"><label>封面URL</label><input id="ew_i" value="' + escHtml(w.image_url || '') + '" placeholder="https://..."></div><div class="fg"><label>摘要</label><textarea id="ew_e" rows="2">' + escHtml(w.excerpt || '') + '</textarea></div><div class="fg"><label>内容 *</label><textarea id="ew_co" rows="8" required>' + escHtml(w.content || '') + '</textarea></div><button type="submit" class="bt" style="width:100%">💾 保存修改</button></form>';
                qs('#mob').innerHTML = h;
            }).catch(function(e) { showToast('加载失败: ' + e.message, 'er'); });
        }

        function addWork() {
            openModal('<button class="x" onclick="closeModal()">&times;</button><h3>➕ 添加新作品</h3><form onsubmit="return createWork(event)"><div class="fg"><label>标题 *</label><input id="aw_t" required></div><div class="fr"><div class="fg"><label>作者 *</label><input id="aw_a" required></div><div class="fg"><label>年级</label><input id="aw_g"></div></div><div class="fr"><div class="fg"><label>班级</label><input id="aw_c"></div><div class="fg"><label>类型</label><select id="aw_ct"><option value="prose">散文</option><option value="poetry">诗歌</option><option value="fiction">小说</option><option value="essay">随笔</option></select></div></div><div class="fg"><label>封面URL</label><input id="aw_i" placeholder="https://..."></div><div class="fg"><label>摘要</label><textarea id="aw_e" rows="2"></textarea></div><div class="fg"><label>内容 *</label><textarea id="aw_co" rows="8" required></textarea></div><button type="submit" class="bt" style="width:100%">➕ 添加作品</button></form>');
        }

        function saveWork(e, id) {
            e.preventDefault();
            var b = { title: qs('#ew_t').value, author: qs('#ew_a').value, grade: qs('#ew_g').value, class_name: qs('#ew_c').value, category: qs('#ew_ct').value, image_url: qs('#ew_i').value, excerpt: qs('#ew_e').value, content: qs('#ew_co').value };
            api('works?id=eq.' + id, { method: 'PATCH', body: b }).then(function() { closeModal(); showToast('✅ 作品已更新'); switchPanel('w'); }).catch(function(e) { showToast('保存失败: ' + e.message, 'er'); });
            return false;
        }

        function createWork(e) {
            e.preventDefault();
            var b = { title: qs('#aw_t').value, author: qs('#aw_a').value, grade: qs('#aw_g').value, class_name: qs('#aw_c').value, category: qs('#aw_ct').value, image_url: qs('#aw_i').value, excerpt: qs('#aw_e').value, content: qs('#aw_co').value, likes: 0, published: true };
            api('works', { method: 'POST', body: b }).then(function() { closeModal(); showToast('✅ 作品已添加'); switchPanel('w'); }).catch(function(e) { showToast('添加失败: ' + e.message, 'er'); });
            return false;
        }

        function exportCSV(table, filter, search) {
            var q = table + '?select=*&limit=5000'; if (filter) q += '&status=eq.' + filter;
            if (search) {
                if (table === 'submissions') q += '&or=(title.ilike.%25' + encodeURIComponent(search) + '%25,name.ilike.%25' + encodeURIComponent(search) + '%25)';
                else if (table === 'member_applications') q += '&or=(name.ilike.%25' + encodeURIComponent(search) + '%25,email.ilike.%25' + encodeURIComponent(search) + '%25)';
                else if (table === 'works') q += '&or=(title.ilike.%25' + encodeURIComponent(search) + '%25,author.ilike.%25' + encodeURIComponent(search) + '%25,category.ilike.%25' + encodeURIComponent(search) + '%25)';
                else if (table === 'comments') q += '&content.ilike.%25' + encodeURIComponent(search) + '%25';
            }
            api(q).then(function(data) {
                if (!data || !data.length) { showToast('无数据可导出', 'er'); return; }
                var exclude = ['id', 'updated_at'], headers = Object.keys(data[0]).filter(function(k) { return exclude.indexOf(k) === -1; });
                var csv = '\uFEFF' + headers.join(',') + '\n';
                data.forEach(function(row) { csv += headers.map(function(k) { var v = row[k]; if (v === null || v === undefined) v = ''; else v = String(v).replace(/"/g, '""'); return '"' + v + '"'; }).join(',') + '\n'; });
                var blob = new Blob([csv], { type: 'text/csv;charset=utf-8' }), a = document.createElement('a');
                a.href = URL.createObjectURL(blob); a.download = table + '_' + new Date().toISOString().slice(0, 10) + '.csv'; a.click();
                showToast('📥 导出成功 (' + data.length + ' 条)');
            }).catch(function(e) { showToast('导出失败: ' + e.message, 'er'); });
        }

        function openModal(html) { qs('#mob').innerHTML = html; qs('#mo').classList.add('show'); }
        function closeModal() { qs('#mo').classList.remove('show'); }
        qs('#mo').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
        document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });
        qs('#lpw').addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });
        qs('#le').addEventListener('keydown', function(e) { if (e.key === 'Enter') qs('#lpw').focus(); });

        if (sessionStorage.getItem('ok') === '1') {
            qs('#lp').style.display = 'none'; qs('#app').classList.add('show'); switchPanel('d'); refreshBadges(); setInterval(refreshBadges, 60000);
        }
    </script>
</body>
</html>
